<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <i class="fas fa-graduation-cap"></i>
    </div>
    <div class="sidebar-title">AI Learning</div>
  </div>
  
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Main</div>
      <a routerLink="/dashboard" class="nav-item" routerLinkActive="active">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/audio-learning" class="nav-item" routerLinkActive="active">
        <i class="fas fa-microphone"></i>
        <span>Audio Learning</span>
      </a>
      <a routerLink="/discussions" class="nav-item" routerLinkActive="active">
        <i class="fas fa-comments"></i>
        <span>Discussions</span>
      </a>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-title">Progress</div>
      <a routerLink="/progress" class="nav-item" routerLinkActive="active">
        <i class="fas fa-chart-line"></i>
        <span>My Progress</span>
      </a>
      <a routerLink="/analytics" class="nav-item" routerLinkActive="active">
        <i class="fas fa-chart-pie"></i>
        <span>Analytics</span>
      </a>
      <a routerLink="/leaderboard" class="nav-item" routerLinkActive="active">
        <i class="fas fa-trophy"></i>
        <span>Leaderboard</span>
      </a>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-title">Account</div>
      <a routerLink="/profile" class="nav-item" routerLinkActive="active">
        <i class="fas fa-user"></i>
        <span>Profile</span>
      </a>
      <a routerLink="/settings" class="nav-item" routerLinkActive="active">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
      <a href="#" class="nav-item" (click)="logout(); $event.preventDefault()">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
      </a>
    </div>
  </nav>
</aside>
